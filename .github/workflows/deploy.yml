name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]   # или "master", смотря что у вас

# Даём разрешение на деплой
permissions:
  contents: read
  pages: write
  id-token: write

# Не даём запускать несколько деплоев одновременно
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # ВАЖНО: укажите правильную папку!
          # Если сборка идёт в dist → path: './dist'
          # Если в build → path: './build'
          # Если в docs → path: './docs'
          path: './build'   # ← ИЗМЕНИТЕ ЭТО на вашу папку

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4