name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]

# Даём разрешение на деплой
permissions:
  contents: read
  pages: write
  id-token: write

# Не даём запускать несколько деплоев одновременно
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5 # Обновлено с v4 на v5

      - name: Setup Node.js
        uses: actions/setup-node@v5 # Обновлено с v4 на v5
        with:
          node-version: '20' # Твой проект внутри по-прежнему собирается на Node 20, это ок
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5 # Обновлено с v4 на v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
